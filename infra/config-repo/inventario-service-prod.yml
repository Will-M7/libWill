server:
  port: 9094

spring:
  datasource:
    url: jdbc:mysql://${INVENTARIO_DB_HOST:mysql}:${INVENTARIO_DB_PORT:3306}/${INVENTARIO_DB_NAME:db_inventario}?createDatabaseIfNotExist=true
    username: ${INVENTARIO_DB_USERNAME:root}
    password: ${INVENTARIO_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://registry-server:7081/eureka
