server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${LIBWILL_DB_HOST:localhost}:${LIBWILL_DB_PORT:3307}/${LIBWILL_DB_NAME:libWill}
    username: ${LIBWILL_DB_USERNAME:root}
    password: ${LIBWILL_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

libwill:
  app:
    jwtSecret: ${LIBWILL_JWT_SECRET:SecretKeyLIBWILL1234567890SUPERSEGURA2026!}
    jwtExpirationMs: ${LIBWILL_JWT_EXPIRATION_MS:86400000}
