server:
  port: 9096

spring:
  datasource:
    url: jdbc:mysql://${VENTA_DB_HOST:mysql}:${VENTA_DB_PORT:3306}/${VENTA_DB_NAME:db_venta}?createDatabaseIfNotExist=true
    username: ${VENTA_DB_USERNAME:root}
    password: ${VENTA_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://registry-server:7081/eureka
